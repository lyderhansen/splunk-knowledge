<form class="splunk-formatter-section" section-label="Data configurations">
    <splunk-control-group label="Metric field" help="SPL field for metric name">
        <splunk-text-input name="netflix_viz_pack.stat_strip.metricField" value="metric">
        </splunk-text-input>
    </splunk-control-group>
    <splunk-control-group label="Value field" help="SPL field for metric value">
        <splunk-text-input name="netflix_viz_pack.stat_strip.valueField" value="value">
        </splunk-text-input>
    </splunk-control-group>
    <splunk-control-group label="Delta field" help="SPL field for trend delta percentage">
        <splunk-text-input name="netflix_viz_pack.stat_strip.deltaField" value="delta">
        </splunk-text-input>
    </splunk-control-group>
    <splunk-control-group label="Unit field" help="SPL field for unit suffix">
        <splunk-text-input name="netflix_viz_pack.stat_strip.unitField" value="unit">
        </splunk-text-input>
    </splunk-control-group>
</form>

<form class="splunk-formatter-section" section-label="Data display">
    <splunk-control-group label="Decimals" help="Fixed decimal places (-1 for auto)">
        <splunk-text-input name="netflix_viz_pack.stat_strip.decimals" value="-1">
        </splunk-text-input>
    </splunk-control-group>
</form>

<form class="splunk-formatter-section" section-label="Color and style">
    <splunk-control-group label="Theme" help="Color scheme for the visualization">
        <splunk-radio-input name="netflix_viz_pack.stat_strip.theme" value="dark" default="">
            <option value="dark">Dark</option>
            <option value="light">Light</option>
        </splunk-radio-input>
    </splunk-control-group>
    <splunk-control-group label="Accent color" help="Primary highlight color">
        <splunk-color-picker name="netflix_viz_pack.stat_strip.accentColor"
            type="custom" value="#E50914">
            <splunk-color>#E50914</splunk-color>
            <splunk-color>#B20710</splunk-color>
            <splunk-color>#46D369</splunk-color>
            <splunk-color>#F0B429</splunk-color>
            <splunk-color>#F5F5F1</splunk-color>
        </splunk-color-picker>
    </splunk-control-group>
    <splunk-control-group label="Accent intensity" help="Hover highlight strength (0-100)">
        <splunk-text-input name="netflix_viz_pack.stat_strip.accentIntensity" value="50">
        </splunk-text-input>
    </splunk-control-group>
</form>
