[riot_kpi_tile]
label = Riot KPI Tile
description = Hextech-styled KPI tile with glow accent, trend indicator, and optional sparkline
default_height = 180
allow_user_selection = true
disabled = 0
search_fragment = | stats count as value | eval label="Active Players"

[riot_latency_bars]
label = Riot Latency Bars
description = Regional latency comparison with gradient fill and threshold markers
default_height = 350
allow_user_selection = true
disabled = 0
search_fragment = | stats avg(latency) as latency by region

[riot_load_gauge]
label = Riot Load Gauge
description = Ring gauge with hextech glow showing player load vs capacity
default_height = 300
allow_user_selection = true
disabled = 0
search_fragment = | stats sum(current) as value sum(capacity) as max

[riot_incident_feed]
label = Riot Incident Feed
description = Scrolling service incident list with severity, region, and timestamp
default_height = 400
allow_user_selection = true
disabled = 0
search_fragment = | table _time severity region message service
