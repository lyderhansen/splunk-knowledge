[stripe_kpi]
label = Stripe KPI Tile
description = Minimal KPI tile with trend indicator, Stripe brand styling
default_height = 120
allow_user_selection = true
disabled = 0
search_fragment = | stats count as value | eval label="Metric" | eval unit="" | eval trend="+2.4" | eval trend_direction="up"

[stripe_table]
label = Stripe Transaction Table
description = Sortable paginated data table with column controls, Stripe styling
default_height = 400
allow_user_selection = true
disabled = 0
search_fragment = | stats count by source | sort -count

[stripe_trend]
label = Stripe Trend Line
description = Time-series line with threshold marker, Stripe brand styling
default_height = 250
allow_user_selection = true
disabled = 0
search_fragment = | timechart span=1h count as value

[stripe_gauge]
label = Stripe Dispute Gauge
description = Ring gauge with gradient fill, Stripe brand styling
default_height = 250
allow_user_selection = true
disabled = 0
search_fragment = | stats count as value | eval max=100
