<form class="splunk-formatter-section" section-label="Data configurations">
    <splunk-control-group label="Columns" help="Comma-separated list of SPL fields to display">
        <splunk-text-input name="netflix_viz_pack.content_table.columns" value="title_name,type,views,rating,weeks_in_top10,genre">
        </splunk-text-input>
    </splunk-control-group>
    <splunk-control-group label="Max rows" help="Maximum rows to display (0 for all)">
        <splunk-text-input name="netflix_viz_pack.content_table.maxRows" value="0">
        </splunk-text-input>
    </splunk-control-group>
</form>

<form class="splunk-formatter-section" section-label="Color and style">
    <splunk-control-group label="Theme" help="Color scheme for the visualization">
        <splunk-radio-input name="netflix_viz_pack.content_table.theme" value="dark" default="">
            <option value="dark">Dark</option>
            <option value="light">Light</option>
        </splunk-radio-input>
    </splunk-control-group>
    <splunk-control-group label="Accent color" help="Highlight color for badges and hover">
        <splunk-color-picker name="netflix_viz_pack.content_table.accentColor"
            type="custom" value="#E50914">
            <splunk-color>#E50914</splunk-color>
            <splunk-color>#B20710</splunk-color>
            <splunk-color>#46D369</splunk-color>
            <splunk-color>#F0B429</splunk-color>
            <splunk-color>#F5F5F1</splunk-color>
        </splunk-color-picker>
    </splunk-control-group>
    <splunk-control-group label="Accent intensity" help="Hover highlight strength (0-100)">
        <splunk-text-input name="netflix_viz_pack.content_table.accentIntensity" value="50">
        </splunk-text-input>
    </splunk-control-group>
</form>
