[kpi_tile]
label = Porsche KPI Tile
description = Precision timing tower cell for lap times, gaps, positions, and deltas
default_height = 120
allow_user_selection = true
disabled = 0
search_fragment = | stats latest(value) as value latest(label) as label latest(delta) as delta

[needle_gauge]
label = Porsche Needle Gauge
description = Precision instrument gauge with red zone for speed, RPM, and telemetry
default_height = 360
allow_user_selection = true
disabled = 0
search_fragment = | stats latest(value) as value latest(label) as label

[tire_timeline]
label = Porsche Tire Timeline
description = Horizontal compound strategy bars per driver stint
default_height = 280
allow_user_selection = true
disabled = 0
search_fragment = | table driver stint compound startLap endLap totalLaps

[energy_bar]
label = Porsche Energy Bar
description = Stacked attack/defend/neutral energy deployment per driver
default_height = 240
allow_user_selection = true
disabled = 0
search_fragment = | table label attack defend neutral

[sector_table]
label = Porsche Sector Table
description = S1/S2/S3 timing screen with color-coded deltas
default_height = 320
allow_user_selection = true
disabled = 0
search_fragment = | table driver s1 s2 s3 total s1_delta s2_delta s3_delta total_delta position
