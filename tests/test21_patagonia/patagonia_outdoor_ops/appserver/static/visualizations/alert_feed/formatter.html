<form class="splunk-formatter-section" section-label="Theme">
  <splunk-control-group label="Theme" help="Auto detects the Splunk UI theme; Dark or Light override it manually.">
    <splunk-radio-input name="{{VIZ_NAMESPACE}}.themeMode" default="auto">
      <option value="auto">Auto</option>
      <option value="dark">Dark</option>
      <option value="light">Light</option>
    </splunk-radio-input>
  </splunk-control-group>
</form>

<form class="splunk-formatter-section" section-label="Data configurations">
  <splunk-control-group label="Time field" help="SPL field containing the event timestamp. Supports ISO (2026-05-13T08:42:00), epoch seconds, and epoch milliseconds.">
    <splunk-text-input name="{{VIZ_NAMESPACE}}.timeField" default="_time"></splunk-text-input>
  </splunk-control-group>
  <splunk-control-group label="Severity field" help="SPL field containing severity level. Recognized values: critical, crit, warning, warn, info.">
    <splunk-text-input name="{{VIZ_NAMESPACE}}.severityField" default="severity"></splunk-text-input>
  </splunk-control-group>
  <splunk-control-group label="Message field" help="SPL field containing the alert message text.">
    <splunk-text-input name="{{VIZ_NAMESPACE}}.messageField" default="message"></splunk-text-input>
  </splunk-control-group>
  <splunk-control-group label="Category field" help="SPL field for the category pill shown on each row.">
    <splunk-text-input name="{{VIZ_NAMESPACE}}.categoryField" default="category"></splunk-text-input>
  </splunk-control-group>
  <splunk-control-group label="Region field" help="SPL field for the region pill shown on each row.">
    <splunk-text-input name="{{VIZ_NAMESPACE}}.regionField" default="region"></splunk-text-input>
  </splunk-control-group>
</form>

<form class="splunk-formatter-section" section-label="Data display">
  <splunk-control-group label="Max rows" help="Maximum number of alert rows to display. Rows beyond this count are clipped.">
    <splunk-text-input name="{{VIZ_NAMESPACE}}.maxRows" default="10"></splunk-text-input>
  </splunk-control-group>
  <splunk-control-group label="Show category" help="Display the category pill on each alert row.">
    <splunk-radio-input name="{{VIZ_NAMESPACE}}.showCategory" default="true">
      <option value="true">On</option>
      <option value="false">Off</option>
    </splunk-radio-input>
  </splunk-control-group>
  <splunk-control-group label="Show region" help="Display the region pill on each alert row.">
    <splunk-radio-input name="{{VIZ_NAMESPACE}}.showRegion" default="true">
      <option value="true">On</option>
      <option value="false">Off</option>
    </splunk-radio-input>
  </splunk-control-group>
</form>

<form class="splunk-formatter-section" section-label="Color and style">
  <splunk-control-group label="Critical color" help="Accent border and severity dot color for critical alerts.">
    <splunk-color-picker name="{{VIZ_NAMESPACE}}.colorCritical" default="#B86B52" type="custom">
      <splunk-color token="#B86B52"></splunk-color>
      <splunk-color token="#EF5350"></splunk-color>
      <splunk-color token="#B71C1C"></splunk-color>
      <splunk-color token="#FF5252"></splunk-color>
    </splunk-color-picker>
  </splunk-control-group>
  <splunk-control-group label="Warning color" help="Accent border and severity dot color for warning alerts.">
    <splunk-color-picker name="{{VIZ_NAMESPACE}}.colorWarning" default="#C9956B" type="custom">
      <splunk-color token="#C9956B"></splunk-color>
      <splunk-color token="#FFB74D"></splunk-color>
      <splunk-color token="#FF9800"></splunk-color>
      <splunk-color token="#F57C00"></splunk-color>
    </splunk-color-picker>
  </splunk-control-group>
  <splunk-control-group label="Info color" help="Accent border and severity dot color for informational alerts.">
    <splunk-color-picker name="{{VIZ_NAMESPACE}}.colorInfo" default="#6899A9" type="custom">
      <splunk-color token="#6899A9"></splunk-color>
      <splunk-color token="#42A5F5"></splunk-color>
      <splunk-color token="#1565C0"></splunk-color>
      <splunk-color token="#80DEEA"></splunk-color>
    </splunk-color-picker>
  </splunk-control-group>
  <splunk-control-group label="Accent intensity (0–100)" help="Controls severity dot glow and accent border saturation. 0 = muted; 100 = maximum glow.">
    <splunk-text-input name="{{VIZ_NAMESPACE}}.accentIntensity" default="50"></splunk-text-input>
  </splunk-control-group>
</form>
