[jwst_heat_grid]
label = JWST Heat Grid
description = Hexagonal heat grid for sensor temperature monitoring with infrared spectrum color ramp
default_height = 300
search_fragment = | stats avg(temperature) by sensor, _time

[jwst_instrument_matrix]
label = JWST Instrument Matrix
description = 2x2 instrument status cards with mode, uptime, and drilldown support
default_height = 280
search_fragment = | stats latest(status) latest(mode) latest(uptime_pct) by instrument

[jwst_data_cascade]
label = JWST Data Cascade
description = Vertical cascade waterfall showing data download streams with particle animation
default_height = 250
search_fragment = | stats latest(transferred_gb) latest(planned_gb) latest(rate_mbps) by band

[jwst_observation_queue]
label = JWST Observation Queue
description = Prioritized observation target list with timeline bars and status indicators
default_height = 300
search_fragment = | sort priority | head 5

[jwst_power_horizon]
label = JWST Power Horizon
description = Dual-layer area chart showing solar generation vs instrument consumption with balance zone
default_height = 250
search_fragment = | timechart span=30m avg(solar_watts) avg(consumption_watts) avg(battery_pct)

[jwst_kpi_tile]
label = JWST KPI Tile
description = Single value KPI with sparkline, trend delta, threshold coloring, and hexagonal accent
default_height = 120
search_fragment = | stats latest(value) sparkline(value) as sparkline by label
