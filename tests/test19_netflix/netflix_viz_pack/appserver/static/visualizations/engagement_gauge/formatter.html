<form class="splunk-formatter-section" section-label="Data configurations">
    <splunk-control-group label="Value field" help="SPL field for the gauge value">
        <splunk-text-input name="netflix_viz_pack.engagement_gauge.field" value="value">
        </splunk-text-input>
    </splunk-control-group>
    <splunk-control-group label="Max value" help="Maximum value for the gauge scale">
        <splunk-text-input name="netflix_viz_pack.engagement_gauge.maxValue" value="100">
        </splunk-text-input>
    </splunk-control-group>
</form>

<form class="splunk-formatter-section" section-label="Data display">
    <splunk-control-group label="Label" help="Text shown below the gauge arc">
        <splunk-text-input name="netflix_viz_pack.engagement_gauge.label" value="">
        </splunk-text-input>
    </splunk-control-group>
    <splunk-control-group label="Unit" help="Unit displayed in the center">
        <splunk-text-input name="netflix_viz_pack.engagement_gauge.unit" value="%">
        </splunk-text-input>
    </splunk-control-group>
    <splunk-control-group label="Decimals" help="Fixed decimal places (-1 for auto)">
        <splunk-text-input name="netflix_viz_pack.engagement_gauge.decimals" value="1">
        </splunk-text-input>
    </splunk-control-group>
    <splunk-control-group label="Show glow" help="Red glow effect on filled arc">
        <splunk-radio-input name="netflix_viz_pack.engagement_gauge.showGlow" value="true">
            <option value="true">Yes</option>
            <option value="false">No</option>
        </splunk-radio-input>
    </splunk-control-group>
</form>

<form class="splunk-formatter-section" section-label="Color and style">
    <splunk-control-group label="Theme" help="Color scheme for the visualization">
        <splunk-radio-input name="netflix_viz_pack.engagement_gauge.theme" value="dark" default="">
            <option value="dark">Dark</option>
            <option value="light">Light</option>
        </splunk-radio-input>
    </splunk-control-group>
    <splunk-control-group label="Accent color" help="Primary gauge fill color">
        <splunk-color-picker name="netflix_viz_pack.engagement_gauge.accentColor"
            type="custom" value="#E50914">
            <splunk-color>#E50914</splunk-color>
            <splunk-color>#B20710</splunk-color>
            <splunk-color>#46D369</splunk-color>
            <splunk-color>#F0B429</splunk-color>
            <splunk-color>#F5F5F1</splunk-color>
        </splunk-color-picker>
    </splunk-control-group>
    <splunk-control-group label="Accent intensity" help="Glow effect strength (0-100)">
        <splunk-text-input name="netflix_viz_pack.engagement_gauge.accentIntensity" value="50">
        </splunk-text-input>
    </splunk-control-group>
</form>
