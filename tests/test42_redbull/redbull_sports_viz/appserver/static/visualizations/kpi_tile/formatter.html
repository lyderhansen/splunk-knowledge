<!-- No Data configurations section — KPI uses formatData() column indexing. search_fragment is the data contract. -->

<form class="splunk-formatter-section" section-label="Data display">
    <splunk-control-group label="Value field" help="SPL field name for the hero metric value">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.valueField" value="value">
        </splunk-text-input>
    </splunk-control-group>
    <splunk-control-group label="Label field" help="SPL field name for the display label">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.labelField" value="label">
        </splunk-text-input>
    </splunk-control-group>
    <splunk-control-group label="Delta field" help="SPL field name for trend delta value (optional)">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.deltaField" value="delta">
        </splunk-text-input>
    </splunk-control-group>
    <splunk-control-group label="Unit suffix" help="Unit shown after value (e.g. ms, %, pts)">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.unit" value="">
        </splunk-text-input>
    </splunk-control-group>
    <splunk-control-group label="Decimals" help="Number of decimal places (-1 = auto)">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.decimals" value="-1">
        </splunk-text-input>
    </splunk-control-group>
    <splunk-control-group label="Show delta" help="Show trend arrow and delta value below hero metric">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.showDelta" value="true">
            <option value="true">Yes</option>
            <option value="false">No</option>
        </splunk-radio-input>
    </splunk-control-group>
    <splunk-control-group label="Threshold low" help="Values below this threshold trigger low color">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.thresholdLow" value="50">
        </splunk-text-input>
    </splunk-control-group>
    <splunk-control-group label="Threshold high" help="Values above this threshold trigger high color">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.thresholdHigh" value="90">
        </splunk-text-input>
    </splunk-control-group>
    <splunk-control-group label="Drilldown field" help="SPL field name passed on click (e.g. label sends the label value to downstream panels)">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.drilldownField" value="label">
        </splunk-text-input>
    </splunk-control-group>
</form>

<form class="splunk-formatter-section" section-label="Color and style">
    <splunk-control-group label="Theme" help="Auto detects dashboard theme">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.themeMode" value="auto">
            <option value="auto">Auto</option>
            <option value="dark">Dark</option>
            <option value="light">Light</option>
        </splunk-radio-input>
    </splunk-control-group>
    <splunk-control-group label="Background color" help="Panel background color">
        <splunk-color-picker name="{{VIZ_NAMESPACE}}.backgroundColor" type="custom" value="#0C1B3A">
            <splunk-color>#0C1B3A</splunk-color>
            <splunk-color>#DB0032</splunk-color>
            <splunk-color>#F5C518</splunk-color>
            <splunk-color>#C8C8C8</splunk-color>
            <splunk-color>#1A6FBF</splunk-color>
            <splunk-color>#FF5C00</splunk-color>
            <splunk-color>#060E1F</splunk-color>
            <splunk-color>#142444</splunk-color>
        </splunk-color-picker>
    </splunk-control-group>
    <splunk-control-group label="Text color" help="Primary text color for labels and values">
        <splunk-color-picker name="{{VIZ_NAMESPACE}}.fontColor" type="custom" value="#FFFFFF">
            <splunk-color>#FFFFFF</splunk-color>
            <splunk-color>#C8C8C8</splunk-color>
            <splunk-color>#F5C518</splunk-color>
            <splunk-color>#DB0032</splunk-color>
            <splunk-color>#1A6FBF</splunk-color>
            <splunk-color>#FF5C00</splunk-color>
            <splunk-color>#0C1B3A</splunk-color>
            <splunk-color>#060E1F</splunk-color>
        </splunk-color-picker>
    </splunk-control-group>
    <splunk-control-group label="Series 1" help="Color for primary data series">
        <splunk-color-picker name="{{VIZ_NAMESPACE}}.series1Color" type="custom" value="#DB0032">
            <splunk-color>#DB0032</splunk-color>
            <splunk-color>#F5C518</splunk-color>
            <splunk-color>#C8C8C8</splunk-color>
            <splunk-color>#1A6FBF</splunk-color>
            <splunk-color>#FF5C00</splunk-color>
            <splunk-color>#0C1B3A</splunk-color>
            <splunk-color>#060E1F</splunk-color>
            <splunk-color>#142444</splunk-color>
        </splunk-color-picker>
    </splunk-control-group>
    <splunk-control-group label="Accent intensity" help="Highlight glow multiplier (0=off, 50=default, 100+=extreme). Values above 100 amplify glow beyond the standard range.">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.accentIntensity" value="50">
        </splunk-text-input>
    </splunk-control-group>
</form>

<form class="splunk-formatter-section" section-label="Effects">
    <splunk-control-group label="Accent color" help="Glow and highlight overlay color — used only in withAlpha() for hover, glow halo, and selection ring. Never a solid fill.">
        <splunk-color-picker name="{{VIZ_NAMESPACE}}.accentColor" type="custom" value="#F5C518">
            <splunk-color>#F5C518</splunk-color>
            <splunk-color>#DB0032</splunk-color>
            <splunk-color>#C8C8C8</splunk-color>
            <splunk-color>#1A6FBF</splunk-color>
            <splunk-color>#FF5C00</splunk-color>
            <splunk-color>#0C1B3A</splunk-color>
            <splunk-color>#060E1F</splunk-color>
            <splunk-color>#142444</splunk-color>
        </splunk-color-picker>
    </splunk-control-group>
    <splunk-control-group label="Ambient glow" help="Background light source effect">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.showAmbientLight" value="true">
            <option value="true">On</option>
            <option value="false">Off</option>
        </splunk-radio-input>
    </splunk-control-group>
    <splunk-control-group label="Glow" help="Accent glow on hero value and highlights">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.showGlow" value="true">
            <option value="true">On</option>
            <option value="false">Off</option>
        </splunk-radio-input>
    </splunk-control-group>
</form>

<form class="splunk-formatter-section" section-label="Animation">
    <splunk-control-group label="Entrance animation" help="Animate on first render">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.showEntrance" value="true">
            <option value="true">On</option>
            <option value="false">Off</option>
        </splunk-radio-input>
    </splunk-control-group>
    <splunk-control-group label="Critical pulse" help="LED pulse on critical/error states">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.flashCritical" value="false">
            <option value="true">On</option>
            <option value="false">Off</option>
        </splunk-radio-input>
    </splunk-control-group>
    <splunk-control-group label="Hover highlight" help="Highlight on mouse hover">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.showHoverEffect" value="true">
            <option value="true">On</option>
            <option value="false">Off</option>
        </splunk-radio-input>
    </splunk-control-group>
    <splunk-control-group label="Animation speed" help="Controls entrance and transition speed">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.animationSpeed" value="normal">
            <option value="slow">Slow</option>
            <option value="normal">Normal</option>
            <option value="fast">Fast</option>
        </splunk-radio-input>
    </splunk-control-group>
</form>
