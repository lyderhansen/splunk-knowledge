<form class="splunk-formatter-section" section-label="Data Configuration">
    <splunk-control-group label="Name Field" help="Field for object/station name">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.nameField" value="station_name">
        </splunk-text-input>
    </splunk-control-group>
    <splunk-control-group label="Azimuth Field" help="Field for azimuth in degrees (0-360)">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.azimuthField" value="azimuth_deg">
        </splunk-text-input>
    </splunk-control-group>
    <splunk-control-group label="Range Field" help="Field for distance in km">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.rangeField" value="range_km">
        </splunk-text-input>
    </splunk-control-group>
    <splunk-control-group label="Type Field" help="Field for object type (groups by color)">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.typeField" value="station_type">
        </splunk-text-input>
    </splunk-control-group>
    <splunk-control-group label="Drilldown Field" help="Field sent on click">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.drilldownField" value="station_name">
        </splunk-text-input>
    </splunk-control-group>
</form>
<form class="splunk-formatter-section" section-label="Display">
    <splunk-control-group label="Sweep Speed" help="Rotation speed of sweep line">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.sweepSpeed" value="normal">
            <option value="slow">Slow</option>
            <option value="normal">Normal</option>
            <option value="fast">Fast</option>
        </splunk-radio-input>
    </splunk-control-group>
    <splunk-control-group label="Fade Time" help="Seconds before revealed dots fade out">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.fadeTime" value="5">
            <option value="3">3s</option>
            <option value="5">5s</option>
            <option value="8">8s</option>
        </splunk-radio-input>
    </splunk-control-group>
    <splunk-control-group label="Show Grid" help="Display polar grid circles and lines">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.showGrid" value="true">
            <option value="true">On</option>
            <option value="false">Off</option>
        </splunk-radio-input>
    </splunk-control-group>
    <splunk-control-group label="Show Range Labels" help="Display range numbers on grid circles">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.showRangeLabels" value="true">
            <option value="true">On</option>
            <option value="false">Off</option>
        </splunk-radio-input>
    </splunk-control-group>
    <splunk-control-group label="Center Label" help="Label at center of radar (e.g. TDRSS)">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.centerLabel" value="TDRSS">
        </splunk-text-input>
    </splunk-control-group>
    <splunk-control-group label="Max Range" help="Maximum range in km for outer circle">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.maxRange" value="20000">
        </splunk-text-input>
    </splunk-control-group>
</form>
<form class="splunk-formatter-section" section-label="Color and Style">
    <splunk-control-group label="Theme" help="Auto detects dashboard theme">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.themeMode" value="auto">
            <option value="auto">Auto</option>
            <option value="dark">Dark</option>
            <option value="light">Light</option>
        </splunk-radio-input>
    </splunk-control-group>
    <splunk-control-group label="Sweep Color" help="Color of the rotating sweep line">
        <splunk-color-picker name="{{VIZ_NAMESPACE}}.sweepColor" type="custom" value="#00B4FF">
            <splunk-color>#00B4FF</splunk-color>
            <splunk-color>#00E5A0</splunk-color>
            <splunk-color>#C084FC</splunk-color>
            <splunk-color>#FACC15</splunk-color>
        </splunk-color-picker>
    </splunk-control-group>
</form>
<form class="splunk-formatter-section" section-label="Animation">
    <splunk-control-group label="Entrance Animation" help="Grid fades in on first load">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.showEntrance" value="true">
            <option value="true">On</option>
            <option value="false">Off</option>
        </splunk-radio-input>
    </splunk-control-group>
    <splunk-control-group label="Hover Effect" help="Highlight data point on hover">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.showHoverEffect" value="true">
            <option value="true">On</option>
            <option value="false">Off</option>
        </splunk-radio-input>
    </splunk-control-group>
    <splunk-control-group label="Animation Speed" help="Overall animation speed">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.animationSpeed" value="normal">
            <option value="slow">Slow</option>
            <option value="normal">Normal</option>
            <option value="fast">Fast</option>
        </splunk-radio-input>
    </splunk-control-group>
</form>
