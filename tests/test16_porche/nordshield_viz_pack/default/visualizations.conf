[threat_beacon]
label = Threat Beacon
description = Single threat posture score with severity zone indicator
search_fragment = | stats count
default_height = 300
allow_user_selection = true
supports_drilldown = true

[attack_heatmap]
label = Attack Heatmap
description = 24h x 7d temporal attack pattern grid
search_fragment = | stats count by day hour
default_height = 350
allow_user_selection = true
supports_drilldown = true

[host_shield_grid]
label = Host Shield Grid
description = Bird's-eye endpoint status mosaic for 150+ hosts
search_fragment = | stats count by hostname status
default_height = 350
allow_user_selection = true
supports_drilldown = true

[threat_feed]
label = Threat Feed
description = Real-time scrolling alert ticker
search_fragment = | sort - _time
default_height = 400
allow_user_selection = true
supports_drilldown = true

[ops_table]
label = Ops Table
description = Sortable, paginated incident operations table
search_fragment = | table incident_id status severity
default_height = 400
allow_user_selection = true
supports_drilldown = true

[defense_ranking]
label = Defense Ranking
description = Horizontal bar ranking of attacked services with success rate
search_fragment = | sort - attack_count
default_height = 350
allow_user_selection = true
supports_drilldown = true
