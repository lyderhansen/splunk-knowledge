[countdown_timer]
label = Countdown Timer
description = Mission countdown display with LED-style digits and data glow
search_fragment = | eval countdown="T-00:12:34"

[telemetry_gauge]
label = Telemetry Gauge
description = Arc gauge with aerospace tick marks for altitude, velocity, and other telemetry
search_fragment = | eval label="Altitude", value=142.7, unit="km", min=0, max=500

[fuel_gauge]
label = Fuel Gauge
description = Vertical fill gauge with liquid effect for propellant levels
search_fragment = | eval label="LOX", value=87.3, max=100

[stage_tracker]
label = Stage Tracker
description = Horizontal mission timeline showing stage progression
search_fragment = | eval stage="Stage Sep", status="complete", order=4

[burn_tracker]
label = Burn Tracker
description = Landing burn descent visualization with altitude and velocity trajectory
search_fragment = | eval altitude=12.4, velocity=-180, phase="Entry Burn"

[mission_kpi]
label = Mission KPI
description = Themed single value tile for mission statistics
search_fragment = | eval label="Max-Q", value="12,384", unit="Pa"

[event_ticker]
label = Event Ticker
description = Scrolling mission event feed with T+ timestamps
search_fragment = | eval time="T+00:02:34", event="Max-Q", status="nominal"
