<form class="splunk-formatter-section" section-label="Data configurations">
    <splunk-control-group label="Value field" help="SPL field containing the metric value (0-100)">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.valueField" value="value">
        </splunk-text-input>
    </splunk-control-group>
    <splunk-control-group label="Target field" help="SPL field containing the target threshold">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.targetField" value="target">
        </splunk-text-input>
    </splunk-control-group>
    <splunk-control-group label="Label field" help="SPL field for the gauge label text">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.labelField" value="label">
        </splunk-text-input>
    </splunk-control-group>
    <splunk-control-group label="Max value" help="Upper bound of the gauge scale">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.maxValue" value="100">
        </splunk-text-input>
    </splunk-control-group>
</form>

<form class="splunk-formatter-section" section-label="Data display">
    <splunk-control-group label="Show target marker" help="Display the target dot on the arc">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.showTarget" value="true">
            <option value="true">Show</option>
            <option value="false">Hide</option>
        </splunk-radio-input>
    </splunk-control-group>
</form>

<form class="splunk-formatter-section" section-label="Color and style">
    <splunk-control-group label="Accent color" help="Volt accent for target marker and outer rim glow">
        <splunk-color-picker name="{{VIZ_NAMESPACE}}.accentColor" type="custom" value="#CDFF00">
            <splunk-color>#CDFF00</splunk-color>
            <splunk-color>#00E676</splunk-color>
            <splunk-color>#FFAB00</splunk-color>
            <splunk-color>#FF3D00</splunk-color>
            <splunk-color>#FFFFFF</splunk-color>
        </splunk-color-picker>
    </splunk-control-group>
    <splunk-control-group label="Theme" help="Auto detects Dashboard Studio theme. Override for testing.">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.themeMode" value="auto">
            <option value="auto">Auto</option>
            <option value="dark">Dark</option>
            <option value="light">Light</option>
        </splunk-radio-input>
    </splunk-control-group>
    <splunk-control-group label="Accent intensity" help="Glow and accent effect strength (0=off, 50=normal, 100=max)">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.accentIntensity" value="50">
        </splunk-text-input>
    </splunk-control-group>
</form>
