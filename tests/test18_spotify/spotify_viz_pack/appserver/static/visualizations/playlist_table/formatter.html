<form class="splunk-formatter-section" section-label="Data configurations">

    <splunk-control-group label="Playlist name field" help="SPL field containing the playlist name">
        <splunk-text-input name="spotify_viz_pack.playlist_table.playlistField" default="playlist_name">
        </splunk-text-input>
    </splunk-control-group>

    <splunk-control-group label="Followers field" help="SPL field containing follower count (numeric)">
        <splunk-text-input name="spotify_viz_pack.playlist_table.followersField" default="followers">
        </splunk-text-input>
    </splunk-control-group>

    <splunk-control-group label="Tracks field" help="SPL field containing track count (numeric)">
        <splunk-text-input name="spotify_viz_pack.playlist_table.tracksField" default="tracks">
        </splunk-text-input>
    </splunk-control-group>

    <splunk-control-group label="Avg duration field" help="SPL field containing average track duration (e.g. 3:18)">
        <splunk-text-input name="spotify_viz_pack.playlist_table.durationField" default="avg_duration">
        </splunk-text-input>
    </splunk-control-group>

    <splunk-control-group label="Skip rate field" help="SPL field containing skip rate as a percentage (e.g. 8.2)">
        <splunk-text-input name="spotify_viz_pack.playlist_table.skipRateField" default="skip_rate">
        </splunk-text-input>
    </splunk-control-group>

    <splunk-control-group label="Rows per page" help="Number of playlist rows shown per page (default: 10)">
        <splunk-text-input name="spotify_viz_pack.playlist_table.rowsPerPage" default="10">
        </splunk-text-input>
    </splunk-control-group>

</form>

<form class="splunk-formatter-section" section-label="Data display">

    <splunk-control-group label="Show skip rate bar" help="Display the inline bar behind the skip rate percentage">
        <splunk-radio-input name="spotify_viz_pack.playlist_table.showSkipBar" default="true">
            <option value="true">Yes</option>
            <option value="false">No</option>
        </splunk-radio-input>
    </splunk-control-group>

</form>

<form class="splunk-formatter-section" section-label="Color and style">

    <splunk-control-group label="Theme" help="Dark or light panel background mode">
        <splunk-radio-input name="spotify_viz_pack.playlist_table.theme" default="dark">
            <option value="dark">Dark</option>
            <option value="light">Light</option>
        </splunk-radio-input>
    </splunk-control-group>

    <splunk-control-group label="Accent color" help="Color used for the active sort header and pagination arrows">
        <splunk-color-picker name="spotify_viz_pack.playlist_table.accentColor" default="#1DB954">
            <splunk-color value="#1DB954" label="Spotify Green"></splunk-color>
            <splunk-color value="#14B8A6" label="Teal"></splunk-color>
            <splunk-color value="#8B5CF6" label="Purple"></splunk-color>
            <splunk-color value="#E91E8A" label="Pink"></splunk-color>
            <splunk-color value="#3B82F6" label="Blue"></splunk-color>
            <splunk-color value="#F59E0B" label="Amber"></splunk-color>
            <splunk-color value="#F97066" label="Coral"></splunk-color>
        </splunk-color-picker>
    </splunk-control-group>

    <splunk-control-group label="Accent intensity" help="Glow and effect strength (0 = off, 100 = maximum)">
        <splunk-range-input name="spotify_viz_pack.playlist_table.accentIntensity" default="50" min="0" max="100" step="5">
        </splunk-range-input>
    </splunk-control-group>

</form>
