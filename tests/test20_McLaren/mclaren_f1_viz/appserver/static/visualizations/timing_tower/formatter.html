<form class="splunk-formatter-section" section-label="Data configurations">

    <splunk-control-group label="Position field" help="SPL field name for the race position (e.g. P1, P2)">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.positionField" value="position">
        </splunk-text-input>
    </splunk-control-group>

    <splunk-control-group label="Driver field" help="SPL field name for the driver name — also used as the drilldown click.name token">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.driverField" value="driver">
        </splunk-text-input>
    </splunk-control-group>

    <splunk-control-group label="Gap field" help="SPL field name for gap to leader (e.g. +0.197 or LEADER for P1)">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.gapField" value="gap">
        </splunk-text-input>
    </splunk-control-group>

    <splunk-control-group label="Compound field" help="SPL field name for tire compound: Soft, Medium, Hard, Inter, or Wet">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.compoundField" value="compound">
        </splunk-text-input>
    </splunk-control-group>

    <splunk-control-group label="Lap time field" help="SPL field name for the driver's fastest lap time (e.g. 1:21.584)">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.lapTimeField" value="lap_time">
        </splunk-text-input>
    </splunk-control-group>

</form>

<form class="splunk-formatter-section" section-label="Data display">

    <splunk-control-group label="Show lap time" help="Show or hide the lap time column on the right side of the tower">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.showLapTime" value="true">
            <option value="true">Show</option>
            <option value="false">Hide</option>
        </splunk-radio-input>
    </splunk-control-group>

    <splunk-control-group label="Maximum rows" help="Maximum number of driver rows displayed. Rows beyond this limit show a summary footer">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.maxRows" value="20">
        </splunk-text-input>
    </splunk-control-group>

</form>

<form class="splunk-formatter-section" section-label="Color and style">

    <splunk-control-group label="Theme" help="Color scheme — dark for pitwall/carbon aesthetic, light for presentation mode">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.theme" value="dark">
            <option value="dark">Dark</option>
            <option value="light">Light</option>
        </splunk-radio-input>
    </splunk-control-group>

    <splunk-control-group label="Accent color" help="Highlight color for P1-P3 positions and leader row edge glow — default is McLaren papaya orange">
        <splunk-color-picker name="{{VIZ_NAMESPACE}}.accentColor" type="custom" value="#FF8000">
            <splunk-color>#FF8000</splunk-color>
            <splunk-color>#47C7FC</splunk-color>
            <splunk-color>#FF3333</splunk-color>
            <splunk-color>#00D26A</splunk-color>
            <splunk-color>#FFD700</splunk-color>
            <splunk-color>#A855F7</splunk-color>
            <splunk-color>#E8E8E8</splunk-color>
        </splunk-color-picker>
    </splunk-control-group>

    <splunk-control-group label="Accent intensity" help="Strength of the P1 row edge glow effect. Range 0 (off) to 100 (maximum). Default 50">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.accentIntensity" value="50">
        </splunk-text-input>
    </splunk-control-group>

</form>
