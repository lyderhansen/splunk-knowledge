[hero_kpi]
label = Netflix Hero KPI
description = Oversized single-value tile with trend delta and cinematic typography
default_height = 200
allow_user_selection = true
disabled = 0
search_fragment = | stats latest(value) as value latest(delta) as delta

[engagement_gauge]
label = Netflix Engagement Gauge
description = Arc gauge with Netflix red gradient fill for completion metrics
default_height = 250
allow_user_selection = true
disabled = 0
search_fragment = | stats latest(value) as value

[content_table]
label = Netflix Content Table
description = Sortable paginated table with rating badges and type pills
default_height = 400
allow_user_selection = true
disabled = 0
search_fragment = | table title_name type views rating genre

[trend_area]
label = Netflix Trend Area
description = Stacked area chart for subscriber growth and churn trends
default_height = 300
allow_user_selection = true
disabled = 0
search_fragment = | timechart span=1w sum(new_signups) sum(churned)

[genre_bars]
label = Netflix Genre Bars
description = Horizontal bar ranking for genre performance with share pct
default_height = 300
allow_user_selection = true
disabled = 0
search_fragment = | stats sum(total_views) by genre | sort 0 -total_views

[region_board]
label = Netflix Region Board
description = Regional subscriber grid with growth indicators
default_height = 300
allow_user_selection = true
disabled = 0
search_fragment = | stats latest(subscribers) by region

[stat_strip]
label = Netflix Stat Strip
description = Compact horizontal metric strip with mini sparklines
default_height = 120
allow_user_selection = true
disabled = 0
search_fragment = | stats latest(value) as value by metric
