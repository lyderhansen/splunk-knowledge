[kpi_tile]
label = McLaren KPI Tile
description = Branded single value tile with papaya accent bar, optional sparkline, and trend delta.
default_height = 120
allow_user_selection = true
disabled = 0
search_fragment = | stats count as value | eval label="Events"

[timing_tower]
label = McLaren Timing Tower
description = F1-style position board with gaps, tire compounds, and sector indicators.
default_height = 400
allow_user_selection = true
disabled = 0
search_fragment = | inputlookup mclaren_lap_telemetry.csv

[sector_bars]
label = McLaren Sector Bars
description = Segmented horizontal bars showing sector 1 + 2 + 3 time breakdowns per driver.
default_height = 300
allow_user_selection = true
disabled = 0
search_fragment = | inputlookup mclaren_lap_telemetry.csv

[stint_chart]
label = McLaren Stint Chart
description = Gantt-style tire strategy showing compound stints across race laps.
default_height = 350
allow_user_selection = true
disabled = 0
search_fragment = | inputlookup mclaren_tire_strategy.csv

[pit_gauge]
label = McLaren Pit Gauge
description = Horizontal gauge showing pit stop time against a target zone with positions-lost delta.
default_height = 200
allow_user_selection = true
disabled = 0
search_fragment = | inputlookup mclaren_pit_stops.csv

[radio_feed]
label = McLaren Radio Feed
description = Priority-colored team radio message feed with timestamps and driver badges.
default_height = 350
allow_user_selection = true
disabled = 0
search_fragment = | inputlookup mclaren_radio_alerts.csv
