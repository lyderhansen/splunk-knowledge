[Netflix Content Analytics - Hero KPI]
search = | inputlookup netflix_viz_pack_kpi_summary.csv | head 1
dispatch.earliest_time = -24h
dispatch.latest_time = now
display.general.type = visualizations
display.visualizations.type = custom
display.visualizations.custom.type = netflix_viz_pack.hero_kpi
display.visualizations.custom.netflix_viz_pack.hero_kpi.theme = dark
display.visualizations.custom.netflix_viz_pack.hero_kpi.field = value
display.visualizations.custom.netflix_viz_pack.hero_kpi.label = Total Subscribers

[Netflix Content Analytics - Engagement Gauge]
search = | inputlookup netflix_viz_pack_engagement.csv | where metric="Avg Completion Rate"
dispatch.earliest_time = -24h
dispatch.latest_time = now
display.general.type = visualizations
display.visualizations.type = custom
display.visualizations.custom.type = netflix_viz_pack.engagement_gauge
display.visualizations.custom.netflix_viz_pack.engagement_gauge.theme = dark

