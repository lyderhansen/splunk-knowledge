[Uber Ops - KPI Tile Demo]
search = | inputlookup uber_ops_viz_demo_kpis.csv | head 1
dispatch.earliest_time = -24h
dispatch.latest_time = now
display.general.type = visualizations
display.visualizations.type = custom
display.visualizations.custom.type = uber_ops_viz.kpi_tile
display.visualizations.custom.uber_ops_viz.kpi_tile.theme = dark

