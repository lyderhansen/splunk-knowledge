[cf_kpi_tile]
label = CF KPI Tile
description = Single-value KPI tile with Cloudflare orange accent, trend delta, and unit display
default_height = 120
allow_user_selection = true
disabled = 0
search_fragment = | stats latest(value) as value latest(delta) as delta

[cf_edge_grid]
label = CF Edge Grid
description = Health status grid for 20+ edge locations with green/amber/red severity cells
default_height = 400
allow_user_selection = true
disabled = 0
search_fragment = | stats latest(status) as status by location

[cf_trend_line]
label = CF Trend Line
description = Time-series trend line with threshold marker and optional area fill
default_height = 300
allow_user_selection = true
disabled = 0
search_fragment = | timechart avg(latency) as value

[cf_attack_timeline]
label = CF Attack Timeline
description = Scrolling event feed for attack events with severity badges and timestamps
default_height = 400
allow_user_selection = true
disabled = 0
search_fragment = | sort - _time | head 50

[cf_cache_bars]
label = CF Cache Bars
description = Horizontal ranked bar chart for cache ratio by content type
default_height = 300
allow_user_selection = true
disabled = 0
search_fragment = | stats avg(ratio) as value by category | sort - value
