[kpi_tile]
label = Apple KPI Tile
description = Refined single-value KPI tile with trend delta and Apple-style typography
search_fragment = | stats count as value | eval label="Metric" | eval trend=5.2

[revenue_bars]
label = Apple Revenue Bars
description = Horizontal ranking bars with store names and precise Apple spacing
search_fragment = | stats sum(revenue) as revenue by store | sort -revenue | head 10

[satisfaction_gauge]
label = Apple Satisfaction Gauge
description = Circular gauge with Apple-blue gradient and threshold zones
search_fragment = | stats avg(nps) as value | eval maxValue=100

[product_mix]
label = Apple Product Mix
description = Donut composition showing revenue split across product categories
search_fragment = | stats sum(revenue) as value by category

[alert_feed]
label = Apple Alert Feed
description = Scrolling list of store alerts with severity badges
search_fragment = | table severity store message _time | sort -_time
