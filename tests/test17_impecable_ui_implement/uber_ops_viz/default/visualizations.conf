[kpi_tile]
label = Uber KPI Tile
description = Branded single-value KPI with trend delta, unit suffix, and accent glow
default_height = 120
allow_user_selection = true
disabled = 0
search_fragment = | inputlookup uber_ops_viz_demo_kpis.csv | head 1

[surge_heatmap]
label = Uber Surge Heatmap
description = Hour-by-zone grid showing surge pricing intensity across time and zones
default_height = 400
allow_user_selection = true
disabled = 0
search_fragment = | inputlookup uber_ops_viz_demo_surge.csv

[supply_gauge]
label = Uber Supply Gauge
description = Needle-style gauge for driver supply vs demand ratio with branded zones
default_height = 300
allow_user_selection = true
disabled = 0
search_fragment = | inputlookup uber_ops_viz_demo_supply.csv | head 1

[trip_feed]
label = Uber Trip Feed
description = Live scrolling feed of completed trips with fare, distance, duration
default_height = 400
allow_user_selection = true
disabled = 0
search_fragment = | inputlookup uber_ops_viz_demo_trips.csv

[routes_table]
label = Uber Routes Table
description = Ranked route table with sort, pagination, avg fare, and satisfaction
default_height = 400
allow_user_selection = true
disabled = 0
search_fragment = | inputlookup uber_ops_viz_demo_routes.csv
