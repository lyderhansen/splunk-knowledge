[Riot Live Ops - KPI Demo]
search = | inputlookup riot_liveops_viz_demo_kpis.csv
dispatch.earliest_time = -24h
dispatch.latest_time = now
display.general.type = visualizations
display.visualizations.type = custom
display.visualizations.custom.type = riot_liveops_viz.riot_kpi_tile
display.visualizations.custom.riot_liveops_viz.riot_kpi_tile.valueField = value
display.visualizations.custom.riot_liveops_viz.riot_kpi_tile.labelField = label
display.visualizations.custom.riot_liveops_viz.riot_kpi_tile.unitField = unit
display.visualizations.custom.riot_liveops_viz.riot_kpi_tile.trendField = trend
display.visualizations.custom.riot_liveops_viz.riot_kpi_tile.sparklineField = sparkline
display.visualizations.custom.riot_liveops_viz.riot_kpi_tile.themeMode = auto

