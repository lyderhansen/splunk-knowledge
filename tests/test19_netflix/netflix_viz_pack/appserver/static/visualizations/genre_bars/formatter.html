<form class="splunk-formatter-section" section-label="Data configurations">
    <splunk-control-group label="Label field" help="SPL field for bar labels (categories)">
        <splunk-text-input name="netflix_viz_pack.genre_bars.labelField" value="genre">
        </splunk-text-input>
    </splunk-control-group>
    <splunk-control-group label="Value field" help="SPL field for bar values">
        <splunk-text-input name="netflix_viz_pack.genre_bars.valueField" value="total_views">
        </splunk-text-input>
    </splunk-control-group>
    <splunk-control-group label="Share field" help="SPL field for share percentage">
        <splunk-text-input name="netflix_viz_pack.genre_bars.shareField" value="share_pct">
        </splunk-text-input>
    </splunk-control-group>
    <splunk-control-group label="Max bars" help="Maximum number of bars to display">
        <splunk-text-input name="netflix_viz_pack.genre_bars.maxBars" value="10">
        </splunk-text-input>
    </splunk-control-group>
</form>

<form class="splunk-formatter-section" section-label="Data display">
    <splunk-control-group label="Unit" help="Unit suffix for values">
        <splunk-text-input name="netflix_viz_pack.genre_bars.unit" value="">
        </splunk-text-input>
    </splunk-control-group>
    <splunk-control-group label="Show values" help="Show value text next to bars">
        <splunk-radio-input name="netflix_viz_pack.genre_bars.showValues" value="true">
            <option value="true">Yes</option>
            <option value="false">No</option>
        </splunk-radio-input>
    </splunk-control-group>
</form>

<form class="splunk-formatter-section" section-label="Color and style">
    <splunk-control-group label="Theme" help="Color scheme for the visualization">
        <splunk-radio-input name="netflix_viz_pack.genre_bars.theme" value="dark" default="">
            <option value="dark">Dark</option>
            <option value="light">Light</option>
        </splunk-radio-input>
    </splunk-control-group>
    <splunk-control-group label="Accent color" help="Bar fill color">
        <splunk-color-picker name="netflix_viz_pack.genre_bars.accentColor"
            type="custom" value="#E50914">
            <splunk-color>#E50914</splunk-color>
            <splunk-color>#B20710</splunk-color>
            <splunk-color>#46D369</splunk-color>
            <splunk-color>#F0B429</splunk-color>
            <splunk-color>#F5F5F1</splunk-color>
        </splunk-color-picker>
    </splunk-control-group>
    <splunk-control-group label="Accent intensity" help="Bar glow effect strength (0-100)">
        <splunk-text-input name="netflix_viz_pack.genre_bars.accentIntensity" value="50">
        </splunk-text-input>
    </splunk-control-group>
</form>
