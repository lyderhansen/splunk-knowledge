<form class="splunk-formatter-section" section-label="Data Configuration">
    <splunk-control-group label="Time Field" help="Field containing event timestamp">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.timeField" value="_time">
        </splunk-text-input>
    </splunk-control-group>
    <splunk-control-group label="Event Field" help="Field containing event type name">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.eventField" value="event_type">
        </splunk-text-input>
    </splunk-control-group>
    <splunk-control-group label="Severity Field" help="Field for severity (low/medium/high/critical)">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.severityField" value="severity">
        </splunk-text-input>
    </splunk-control-group>
    <splunk-control-group label="Impact Field" help="Field for impact score (scales particle size)">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.impactField" value="impact_score">
        </splunk-text-input>
    </splunk-control-group>
    <splunk-control-group label="Drilldown Field" help="Field sent on click">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.drilldownField" value="event_type">
        </splunk-text-input>
    </splunk-control-group>
</form>
<form class="splunk-formatter-section" section-label="Display">
    <splunk-control-group label="Max Particles" help="Maximum active particles on screen">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.maxParticles" value="200">
            <option value="100">100</option>
            <option value="200">200</option>
            <option value="500">500</option>
        </splunk-radio-input>
    </splunk-control-group>
    <splunk-control-group label="Particle Size" help="Base size of particles">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.particleSize" value="medium">
            <option value="small">Small</option>
            <option value="medium">Medium</option>
            <option value="large">Large</option>
        </splunk-radio-input>
    </splunk-control-group>
    <splunk-control-group label="Flow Speed" help="Particle drift speed">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.flowSpeed" value="normal">
            <option value="slow">Slow</option>
            <option value="normal">Normal</option>
            <option value="fast">Fast</option>
        </splunk-radio-input>
    </splunk-control-group>
    <splunk-control-group label="Show Axis" help="Display time axis at bottom">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.showAxis" value="true">
            <option value="true">On</option>
            <option value="false">Off</option>
        </splunk-radio-input>
    </splunk-control-group>
    <splunk-control-group label="Show Labels" help="Display event labels near particles">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.showLabels" value="true">
            <option value="true">On</option>
            <option value="false">Off</option>
        </splunk-radio-input>
    </splunk-control-group>
    <splunk-control-group label="Lane Mode" help="Scatter particles or organize by event type">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.laneMode" value="scatter">
            <option value="scatter">Scatter</option>
            <option value="lanes">Lanes</option>
        </splunk-radio-input>
    </splunk-control-group>
</form>
<form class="splunk-formatter-section" section-label="Color and Style">
    <splunk-control-group label="Theme" help="Auto detects dashboard theme">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.themeMode" value="auto">
            <option value="auto">Auto</option>
            <option value="dark">Dark</option>
            <option value="light">Light</option>
        </splunk-radio-input>
    </splunk-control-group>
</form>
<form class="splunk-formatter-section" section-label="Animation">
    <splunk-control-group label="Entrance Animation" help="Particles fade in on first load">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.showEntrance" value="true">
            <option value="true">On</option>
            <option value="false">Off</option>
        </splunk-radio-input>
    </splunk-control-group>
    <splunk-control-group label="Flash Critical" help="Pulse critical severity particles">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.flashCritical" value="true">
            <option value="true">On</option>
            <option value="false">Off</option>
        </splunk-radio-input>
    </splunk-control-group>
    <splunk-control-group label="Hover Effect" help="Enlarge nearest particle on hover">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.showHoverEffect" value="true">
            <option value="true">On</option>
            <option value="false">Off</option>
        </splunk-radio-input>
    </splunk-control-group>
    <splunk-control-group label="Animation Speed" help="Overall animation speed">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.animationSpeed" value="normal">
            <option value="slow">Slow</option>
            <option value="normal">Normal</option>
            <option value="fast">Fast</option>
        </splunk-radio-input>
    </splunk-control-group>
</form>
