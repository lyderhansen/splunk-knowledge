[Stripe KPI - Demo]
search = | inputlookup stripe_payment_ops_viz_demo_kpis.csv
dispatch.earliest_time = -24h
dispatch.latest_time = now
display.general.type = visualizations
display.visualizations.type = custom
display.visualizations.custom.type = stripe_payment_ops_viz.stripe_kpi
display.visualizations.custom.stripe_payment_ops_viz.stripe_kpi.valueField = value
display.visualizations.custom.stripe_payment_ops_viz.stripe_kpi.labelField = label
display.visualizations.custom.stripe_payment_ops_viz.stripe_kpi.unitField = unit
display.visualizations.custom.stripe_payment_ops_viz.stripe_kpi.trendField = trend
display.visualizations.custom.stripe_payment_ops_viz.stripe_kpi.trendDirectionField = trend_direction
display.visualizations.custom.stripe_payment_ops_viz.stripe_kpi.themeMode = auto

[Stripe Table - Demo]
search = | inputlookup stripe_payment_ops_viz_demo_transactions.csv
dispatch.earliest_time = -24h
dispatch.latest_time = now
display.general.type = visualizations
display.visualizations.type = custom
display.visualizations.custom.type = stripe_payment_ops_viz.stripe_table
display.visualizations.custom.stripe_payment_ops_viz.stripe_table.maxRows = 20
display.visualizations.custom.stripe_payment_ops_viz.stripe_table.sortField = _time
display.visualizations.custom.stripe_payment_ops_viz.stripe_table.sortOrder = desc
display.visualizations.custom.stripe_payment_ops_viz.stripe_table.cw1 = _time:180
display.visualizations.custom.stripe_payment_ops_viz.stripe_table.cw2 = transaction_id:160
display.visualizations.custom.stripe_payment_ops_viz.stripe_table.cw3 = amount:100
display.visualizations.custom.stripe_payment_ops_viz.stripe_table.cw4 = currency:80
display.visualizations.custom.stripe_payment_ops_viz.stripe_table.cw5 = status:110
display.visualizations.custom.stripe_payment_ops_viz.stripe_table.cw6 = merchant:160
display.visualizations.custom.stripe_payment_ops_viz.stripe_table.cw7 = payment_method:140
display.visualizations.custom.stripe_payment_ops_viz.stripe_table.cw8 = country:80
display.visualizations.custom.stripe_payment_ops_viz.stripe_table.themeMode = auto

