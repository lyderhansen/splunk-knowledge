[JWST Sensor Temperatures]
search = | inputlookup sensor_temperatures.csv | eval _time=strptime(_time, "%Y-%m-%dT%H:%M:%S") | eval temperature=tonumber(temperature) | sort sensor _time
dispatch.earliest_time = -24h
dispatch.latest_time = now

[JWST Instrument Status]
search = | inputlookup instrument_status.csv | eval uptime_pct=tonumber(uptime_pct)
dispatch.earliest_time = -24h
dispatch.latest_time = now

[JWST Data Downloads]
search = | inputlookup data_downloads.csv | eval transferred_gb=tonumber(transferred_gb) | eval planned_gb=tonumber(planned_gb) | eval rate_mbps=tonumber(rate_mbps)
dispatch.earliest_time = -24h
dispatch.latest_time = now

[JWST Observation Queue]
search = | inputlookup observation_queue.csv | eval priority=tonumber(priority) | eval estimated_hours=tonumber(estimated_hours) | sort priority
dispatch.earliest_time = -24h
dispatch.latest_time = now

[JWST Power Balance]
search = | inputlookup power_balance.csv | eval _time=strptime(_time, "%Y-%m-%dT%H:%M:%S") | eval solar_watts=tonumber(solar_watts) | eval consumption_watts=tonumber(consumption_watts) | eval battery_pct=tonumber(battery_pct) | sort _time
dispatch.earliest_time = -24h
dispatch.latest_time = now

[JWST KPI Summary]
search = | inputlookup kpi_summary.csv | eval value=tonumber(value) | eval trend=tonumber(trend)
dispatch.earliest_time = -24h
dispatch.latest_time = now

[JWST KPI NIRCam Temp]
search = | inputlookup kpi_summary.csv | where label="NIRCam Temp" | eval value=tonumber(value) | eval trend=tonumber(trend)
dispatch.earliest_time = -24h
dispatch.latest_time = now

[JWST KPI Data Downloaded]
search = | inputlookup kpi_summary.csv | where label="Data Downloaded" | eval value=tonumber(value) | eval trend=tonumber(trend)
dispatch.earliest_time = -24h
dispatch.latest_time = now
