[CF NOC - KPI Tile Demo]
search = | inputlookup cloudflare_noc_edge_kpis.csv | where metric="requests_sec"
dispatch.earliest_time = -24h
dispatch.latest_time = now
display.general.type = visualizations
display.visualizations.type = custom
display.visualizations.custom.type = cloudflare_noc.cf_kpi_tile
display.visualizations.custom.cloudflare_noc.cf_kpi_tile.valueField = value
display.visualizations.custom.cloudflare_noc.cf_kpi_tile.deltaField = delta
display.visualizations.custom.cloudflare_noc.cf_kpi_tile.label = REQUESTS/SEC
display.visualizations.custom.cloudflare_noc.cf_kpi_tile.accentColor = #F6821F

[CF NOC - Edge Grid Demo]
search = | inputlookup cloudflare_noc_edge_locations.csv | sort location
dispatch.earliest_time = -24h
dispatch.latest_time = now
display.general.type = visualizations
display.visualizations.type = custom
display.visualizations.custom.type = cloudflare_noc.cf_edge_grid
display.visualizations.custom.cloudflare_noc.cf_edge_grid.locationField = location
display.visualizations.custom.cloudflare_noc.cf_edge_grid.statusField = status
display.visualizations.custom.cloudflare_noc.cf_edge_grid.columns = 6

[CF NOC - Trend Line Demo]
search = | inputlookup cloudflare_noc_latency_trend.csv | sort _time
dispatch.earliest_time = -24h
dispatch.latest_time = now
display.general.type = visualizations
display.visualizations.type = custom
display.visualizations.custom.type = cloudflare_noc.cf_trend_line
display.visualizations.custom.cloudflare_noc.cf_trend_line.threshold = 30
display.visualizations.custom.cloudflare_noc.cf_trend_line.lineColor = #F6821F

[CF NOC - Attack Timeline Demo]
search = | inputlookup cloudflare_noc_attack_events.csv | sort - _time
dispatch.earliest_time = -24h
dispatch.latest_time = now
display.general.type = visualizations
display.visualizations.type = custom
display.visualizations.custom.type = cloudflare_noc.cf_attack_timeline
display.visualizations.custom.cloudflare_noc.cf_attack_timeline.maxRows = 20

[CF NOC - Cache Bars Demo]
search = | inputlookup cloudflare_noc_cache_by_type.csv | sort - value
dispatch.earliest_time = -24h
dispatch.latest_time = now
display.general.type = visualizations
display.visualizations.type = custom
display.visualizations.custom.type = cloudflare_noc.cf_cache_bars
display.visualizations.custom.cloudflare_noc.cf_cache_bars.maxBars = 8
display.visualizations.custom.cloudflare_noc.cf_cache_bars.barColor = #F6821F
