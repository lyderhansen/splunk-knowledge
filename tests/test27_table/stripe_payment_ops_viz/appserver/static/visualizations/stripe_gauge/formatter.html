<form class="splunk-formatter-section" section-label="Data Configuration">
    <splunk-control-group label="Value Field" help="Field name for the gauge value">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.valueField" value="value">
        </splunk-text-input>
    </splunk-control-group>
    <splunk-control-group label="Max Field" help="Field name for the maximum value">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.maxField" value="max">
        </splunk-text-input>
    </splunk-control-group>
    <splunk-control-group label="Label Field" help="Field name for the gauge label">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.labelField" value="label">
        </splunk-text-input>
    </splunk-control-group>
</form>
<form class="splunk-formatter-section" section-label="Display Options">
    <splunk-control-group label="Warning Threshold %" help="Percentage of max to show warning color">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.warningThreshold" value="70">
        </splunk-text-input>
    </splunk-control-group>
    <splunk-control-group label="Critical Threshold %" help="Percentage of max to show critical color">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.criticalThreshold" value="90">
        </splunk-text-input>
    </splunk-control-group>
    <splunk-control-group label="Unit" help="Unit text displayed after value">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.unit" value="">
        </splunk-text-input>
    </splunk-control-group>
    <splunk-control-group label="Show Glow" help="Glow effect on the arc">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.showGlow" value="true">
            <option value="true">Yes</option>
            <option value="false">No</option>
        </splunk-radio-input>
    </splunk-control-group>
</form>
<form class="splunk-formatter-section" section-label="Color and Style">
    <splunk-control-group label="Theme" help="Auto detects dashboard theme">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.themeMode" value="auto">
            <option value="auto">Auto</option>
            <option value="dark">Dark</option>
            <option value="light">Light</option>
        </splunk-radio-input>
    </splunk-control-group>
    <splunk-control-group label="Gauge Color" help="Primary color of the gauge arc">
        <splunk-color-picker name="{{VIZ_NAMESPACE}}.gaugeColor" type="custom" value="0x635BFF">
            <splunk-color>0x635BFF</splunk-color>
            <splunk-color>0x0048E5</splunk-color>
            <splunk-color>0x3ECF8E</splunk-color>
            <splunk-color>0x9A6CFF</splunk-color>
        </splunk-color-picker>
    </splunk-control-group>
    <splunk-control-group label="Gradient End Color" help="End color for arc gradient">
        <splunk-color-picker name="{{VIZ_NAMESPACE}}.gradientEnd" type="custom" value="0x9A6CFF">
            <splunk-color>0x9A6CFF</splunk-color>
            <splunk-color>0x80E9FF</splunk-color>
            <splunk-color>0x635BFF</splunk-color>
            <splunk-color>0x0048E5</splunk-color>
        </splunk-color-picker>
    </splunk-control-group>
</form>
