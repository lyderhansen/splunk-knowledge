[battery_gauge]
label = Battery Gauge
description = Segmented ring gauge for battery state of charge with data glow effect
default_height = 300
search_fragment = | stats latest(battery_level) as value

[range_kpi]
label = Range KPI
description = Single value tile with sparkline and trend delta for EV range in km
default_height = 200
search_fragment = | stats latest(range_km) as value latest(range_delta) as trend

[charge_gauge]
label = Charge Gauge
description = Segmented horizontal bar gauge for charging power in kW
default_height = 180
search_fragment = | stats latest(charge_rate_kw) as value

[thermal_table]
label = Thermal Table
description = Temperature sensor table with row drilldown and status chips
default_height = 280
search_fragment = | table sensor temp_celsius max_temp status

[energy_area]
label = Energy Area
description = Stacked area chart for energy consumption and regeneration over time
default_height = 280
search_fragment = | timechart span=5m sum(consumption_kwh) as consumption sum(regeneration_kwh) as regeneration

[regen_donut]
label = Regen Donut
description = Donut ring chart showing regeneration vs consumption energy split
default_height = 250
search_fragment = | stats sum(energy_kwh) as value by category
